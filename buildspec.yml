version: 0.2

env:
  variables:
    NODE_OPTIONS: "--max-old-space-size=8192"
  # AWS_REGION and AWS_ACCOUNT_ID are automatically set by CodeBuild

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REGION_SUFFIX=$(echo $AWS_REGION | tr -d '-')
      - IMAGE_REPO_NAME=eval-managed-${REGION_SUFFIX}/app
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=build-${CODEBUILD_BUILD_NUMBER}
      - echo "Using image tag $IMAGE_TAG"

  build:
    commands:
      - echo Building Docker image for ARM64...
      # Backend (FastAPI + MCP servers + Inspect AI). The frontend is a static
      # Vite SPA published to S3 (see buildspec-scripts/deploy.sh), not an image.
      - docker build --platform linux/arm64 -f docker/backend.Dockerfile -t $REPOSITORY_URI:backend-$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $REPOSITORY_URI:backend-$IMAGE_TAG
      # Also tag and push as latest for simpler deployments
      - docker tag $REPOSITORY_URI:backend-$IMAGE_TAG $REPOSITORY_URI:backend-latest
      - docker push $REPOSITORY_URI:backend-latest
      - echo "Build completed"
