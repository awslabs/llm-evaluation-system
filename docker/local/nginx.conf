# Local reverse proxy — mirrors production ALB + oauth2-proxy routing.
# API and viewer requests go directly to the backend (preserves SSE streaming).
# Everything else goes to the Next.js frontend.

worker_processes 1;
daemon off;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    # Run entirely in /tmp so nginx can start as non-root (node user)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;
    access_log            /tmp/nginx_access.log;
    error_log             /tmp/nginx_error.log;

    large_client_header_buffers 4 32k;
    client_max_body_size 0;  # No upload size limit (local only)

    server {
        listen 4001;

        # ── No-op sign out (oauth2-proxy doesn't exist locally) ──
        location /oauth2/sign_out {
            return 302 /;
        }

        # ── API routes → Backend (direct, streaming-safe) ────
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Inspect AI viewer → Backend ────────────────────
        location /inspect {
            proxy_pass http://127.0.0.1:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        location /health {
            proxy_pass http://127.0.0.1:8080;
        }

        # ── Everything else → Frontend ───────────────────────
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
