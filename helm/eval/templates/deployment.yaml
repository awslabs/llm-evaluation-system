{{- define "eval.backendImage" -}}
{{- if not .Values.projectName }}{{ fail "projectName is required" }}{{- end -}}
{{ .Values.aws.accountId }}.dkr.ecr.{{ .Values.aws.region }}.amazonaws.com/{{ .Values.projectName }}/app:{{ .Values.image.backendTag }}
{{- end -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      initContainers:
        # Unified MCP sidecar (K8s 1.28+ native sidecar)
        - name: eval-mcp
          restartPolicy: Always
          image: {{ include "eval.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          command: ["/usr/bin/tini", "--", "python", "-m", "eval_mcp"]
          ports:
            - containerPort: 8002
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: EVAL_MCP_TRANSPORT
              value: "http"
            - name: USER_STORAGE_BASE
              value: "/data/users"
            - name: INSPECT_SANDBOX_TYPE
              value: "k8s"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-credentials
            - secretRef:
                name: llm-provider-keys
                optional: true
          volumeMounts:
            - name: ephemeral-data
              mountPath: /data
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
      containers:
        - name: backend
          image: {{ include "eval.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-credentials
            - secretRef:
                name: llm-provider-keys
                optional: true
          env:
            - name: USER_STORAGE_BASE
              value: "/data/users"
            - name: EVAL_MCP_URL
              value: "http://localhost:8002/mcp"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: ephemeral-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: ephemeral-data
          emptyDir: {}
