apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: {{ .Values.namespace }}
rules:
  # Minimal permissions - secrets/configmaps mounted via envFrom, not API
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
