# AWS EKS production environment

# Feature flags
hpa:
  enabled: true

# AWS Configuration (REQUIRED: override with --set)
aws:
  region: ""      # --set aws.region=$AWS_REGION
  accountId: ""   # --set aws.accountId=$AWS_ACCOUNT

# ECR images (repository constructed from aws.accountId + aws.region + projectName)
image:
  backendTag: "backend-latest"
  pullPolicy: Always

# Stateless backend — all persistent data in S3
# Scales horizontally under load (HPA), min 2 for high availability
backend:
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  autoscaling:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  # MUST-FIX (docs/EVAL_SHARING_DESIGN.md §7.1): isolate :8080 to oauth2-proxy.
  # Without this, any in-cluster pod can forge X-Forwarded-User. The /health
  # ALB target group hits the pod directly from node IPs in the VPC, so allow
  # the VPC CIDR for that identity-free path only.
  networkPolicy:
    enabled: true
    allowedHealthCheckCIDRs:
      - "10.0.0.0/16"

# oauth2-proxy subchart - handles all authentication at the edge
oauth2-proxy:
  enabled: true
  fullnameOverride: oauth2-proxy
  namespaceOverride: eval-managed
  replicaCount: 2

  config:
    existingSecret: oauth2-proxy-secrets
    configFile: |-
      provider = "oidc"
      provider_display_name = "SSO"
      email_domains = [ "*" ]
      skip_provider_button = true
      insecure_oidc_allow_unverified_email = true
      cookie_secure = true
      cookie_samesite = "lax"
      prompt = "login"
      cookie_expire = "12h"
      cookie_refresh = "0"
      session_cookie_minimal = true
      # false is the oauth2-proxy default. per-request CSRF cookies only help
      # concurrent/parallel logins, but make the OAuth callback brittle: a
      # refreshed/replayed/stale-tab callback can't find its state-specific
      # CSRF cookie and gets a 403 ("CSRF cookie not found"). A single stable
      # CSRF cookie removes that intermittent login 403 for our single-tab flow.
      cookie_csrf_per_request = false
      set_xauthrequest = true
      pass_access_token = false
      pass_authorization_header = false
      # Identity trust boundary (docs/EVAL_SHARING_DESIGN.md §7.1): pin the
      # header behavior explicitly rather than relying on subchart defaults.
      # skip_auth_strip_headers=true makes oauth2-proxy STRIP any inbound
      # client-supplied X-Auth-Request-*/X-Forwarded-User before proxying, then
      # set them from the validated session — so a client cannot inject its own
      # identity. pass_user_headers stays false (we use set_xauthrequest's
      # X-Auth-Request-User, surfaced upstream as X-Forwarded-User by the ALB).
      skip_auth_strip_headers = true
      pass_user_headers = false
      silence_ping_logging = true
      reverse_proxy = true
      upstream_timeout = "120s"
      # /api and /inspect are XHR/non-interactive → return 401 (not a login
      # redirect) when unauthenticated, matching the SPA's fetch flow.
      api_routes = ["/api/", "/inspect/"]
      skip_auth_routes = ["^/health$", "^/ping$"]
      # Single backend origin. The Next.js frontend pod is gone (SPA is served
      # by CloudFront→S3), so there is no longer a "/" frontend upstream. This
      # also fixes the prior mis-route where /inspect fell through to the dead
      # frontend upstream instead of the backend mount.
      upstreams = ["http://backend:8080/"]

  extraEnv:
    - name: OAUTH2_PROXY_OIDC_ISSUER_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: OIDC_ISSUER
    - name: OAUTH2_PROXY_REDIRECT_URL
      value: "https://$(CLOUDFRONT_DOMAIN)/oauth2/callback"

  envFrom:
    - configMapRef:
        name: app-config

  service:
    portNumber: 4180

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
