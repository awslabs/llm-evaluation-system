# Shared defaults for all environments
projectName: ""  # REQUIRED: --set projectName=eval-managed-${REGION_SUFFIX}
namespace: eval-managed

# Feature flags (override per environment)
hpa:
  enabled: false

# oauth2-proxy subchart configuration (see Chart.yaml dependencies)
oauth2-proxy:
  enabled: false  # Enable in AWS (values-aws.yaml)

# AWS Configuration (for image registry)
aws:
  region: ""
  accountId: ""

# Image Configuration (ECR: constructed from aws.accountId + aws.region + projectName)
image:
  backendTag: "latest"
  pullPolicy: Always

# Backend Configuration
backend:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  # Ingress isolation. Off by default (local/dev has no oauth2-proxy pod);
  # enabled in values-aws.yaml. See docs/EVAL_SHARING_DESIGN.md §7.1.
  networkPolicy:
    enabled: false
    # CIDRs allowed to reach :8080 directly for the ALB /health target group.
    # Set to the VPC/node CIDRs in the AWS overlay.
    allowedHealthCheckCIDRs: []

# MCP Sidecar Resources
mcp:
  resources:
    requests:
      memory: "1Gi"
      cpu: "150m"
    limits:
      memory: "2Gi"
      cpu: "750m"
