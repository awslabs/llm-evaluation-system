# ExternalSecret for database credentials (from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.dbSecretArn }}
        property: password
---
# ExternalSecret for Cognito/OIDC credentials (from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oidc-credentials
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: oidc-credentials
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.cognitoSecretName }}
        property: clientSecret
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.cognitoSecretName }}
        property: clientSecret
---
# ExternalSecret for oauth2-proxy credentials (from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: clientId
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: clientSecret
    - secretKey: cookie-secret
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: cookieSecret
