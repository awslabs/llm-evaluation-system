# ExternalSecret for database credentials (from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.dbSecretArn }}
        property: password
---
# ExternalSecret for oauth2-proxy credentials (from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: clientId
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: clientSecret
    - secretKey: cookie-secret
      remoteRef:
        key: {{ .Values.oauth2ProxySecretName }}
        property: cookieSecret
---
# ExternalSecret for LLM provider API keys (optional — from Secrets Manager)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-provider-keys
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: llm-provider-keys
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.llmProviderKeysSecretName }}
        property: OPENAI_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.llmProviderKeysSecretName }}
        property: ANTHROPIC_API_KEY
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: {{ .Values.llmProviderKeysSecretName }}
        property: GOOGLE_API_KEY
