worker_processes 1;

events {
    worker_connections 128;
}

http {
    # Without these, JS/CSS are served as text/plain and the browser refuses
    # to execute ES modules (strict MIME checking) → blank SPA.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    large_client_header_buffers 4 32k;
    client_max_body_size 0;

    server {
        listen 4001;

        location /oauth2/sign_out {
            return 302 /;
        }

        location /api/ {
            proxy_pass http://backend:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /inspect {
            proxy_pass http://backend:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://backend:8080;
        }

        # Static SPA (Vite build mounted from frontend/dist). Hashed assets
        # under /assets are content-addressed, so cache them hard; everything
        # else falls back to index.html so the client router resolves deep
        # links and hard refreshes. Same single-origin contract as AWS.
        root /usr/share/nginx/html;

        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
