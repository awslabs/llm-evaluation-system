worker_processes 1;

events {
    worker_connections 128;
}

http {
    # Without these, JS/CSS are served as text/plain and the browser refuses
    # to execute ES modules (strict MIME checking) → blank SPA.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    large_client_header_buffers 4 32k;
    client_max_body_size 0;

    server {
        listen 4001;

        location /oauth2/sign_out {
            return 302 /;
        }

        location /api/ {
            proxy_pass http://backend:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /inspect {
            proxy_pass http://backend:8080;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://backend:8080;
        }

        # Everything else (the SPA shell, /assets/*, client-routed paths) is
        # served by the backend single-origin — same as EKS, where the backend
        # serves both the API and the static bundle. nginx is just the edge.
        location / {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
